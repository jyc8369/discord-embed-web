{% extends "layout.html" %}
{% block content %}
  <div class="card">
    <h2>Edit Embed Record #{{ record.id }}</h2>
    <form action="{{ url_for('update_history', record_id=record.id) }}" method="post" class="embed-preview-form">
      <label for="title">Title</label>
      <input id="title" name="title" value="{{ record.embed_payload.title or '' }}" />

      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4">{{ record.embed_payload.description or '' }}</textarea>

      <label for="color">Color (hex)</label>
      <input id="color" name="color" value="{% if record.embed_payload.color %}#{{ '%06x'|format(record.embed_payload.color) }}{% endif %}" />

      <label for="footer_text">Footer text</label>
      <input id="footer_text" name="footer_text" value="{{ record.embed_payload.footer.text if record.embed_payload.footer else '' }}" />

      <label for="image_url">Image URL</label>
      <input id="image_url" name="image_url" value="{{ record.embed_payload.image.url if record.embed_payload.image else '' }}" />

      <label for="thumbnail_url">Thumbnail URL</label>
      <input id="thumbnail_url" name="thumbnail_url" value="{{ record.embed_payload.thumbnail.url if record.embed_payload.thumbnail else '' }}" />

      {% for i in range(1, 4) %}
        <label>Field {{ i }}</label>
        <input id="field_{{ i }}_name" name="field_{{ i }}_name" placeholder="Field title" value="{{ record.embed_payload.fields[i-1].name if record.embed_payload.fields and record.embed_payload.fields|length >= i else '' }}" />
        <input id="field_{{ i }}_value" name="field_{{ i }}_value" placeholder="Field value" value="{{ record.embed_payload.fields[i-1].value if record.embed_payload.fields and record.embed_payload.fields|length >= i else '' }}" />
      {% endfor %}

      <div class="card embed-preview-card">
        <h3>Embed Preview</h3>
        <div class="discord-message-inner">
          <div class="discord-author-avatar">EG</div>
          <div class="discord-message-content">
            <div class="discord-author-info">
              <span class="discord-author-username">Embed</span>
              <span class="discord-application-tag">Bot</span>
            </div>
            <div class="discord-message-timestamp">Preview</div>
            <div class="discord-embed">
              <div class="discord-left-border" id="preview-color"></div>
              <div class="discord-embed-root">
                <div class="discord-embed-title" id="preview-title">title</div>
                <div class="discord-embed-description" id="preview-description">Description</div>
                <div class="discord-embed-fields" id="preview-fields"></div>
                <div class="discord-embed-media">
                  <img id="preview-image" alt="Embed image preview" />
                  <img id="preview-thumbnail" alt="Embed thumbnail preview" />
                </div>
                <div class="discord-embed-footer" id="preview-footer">Footer text</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <button type="submit">Update Embed</button>
    </form>
  </div>
{% endblock %}
